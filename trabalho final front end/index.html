<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <meta charset="UTF-8">
    <title>Viagem</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
 
<body>
 
    <div class="container">
 
        <header>
            <a href="index.html">
            <img src="imagens/logo.jpg" alt="Logo da Empresa" class="logo Img">
            </a>
            
            
            <nav class="menu">
                <a href="index.html">Início</a>
                <a href="viagenspelomundo.html">Viagens pelo Mundo</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html">Contato</a>
            </nav>
            
        </header>
 
        <section class="banner">
            <h2>Viva a vida em todo lugar!</h2>
            
        </section>
        
        <main class="products">

            <section class="search-hero">
     <h1><br>Onde quer ir hoje?</h1>

     <div class="search-box"> <br>
<input type="radio" id="ida" name="tipoViagem" value="ida" checked>
            <label for="ida">Só Ida</label>
            <input type="radio" id="volta" name="tipoViagem" value="volta">
            <label for="volta">Ida e Volta</label>
        </div>
        <!-- Opções de Viagem -->
        <div class="trip-type">
            
        
        <input type="text" placeholder="Origem">
        <input type="text" placeholder="Destino">
        <input type="date" title="Data de Ida">
        
        <!-- Campo de Volta com classe específica para CSS -->
        <input type="date" title="Data de Volta" class="data-volta">
        
        <button>Procurar</button>
        </div>
        </section>
        <p><p></p><p></p>
            <section class="card">
                <img src="imagens\rio_de_janeiro.jpeg" alt="Viagem ao Rio de Janeiro">
                <h3>Rio de Janeiro</h3>
                <p>R$ 565,90</p>
            </section>
 
            <section class="card">
                <img src="imagens\chile.jpeg" alt="Viagem ao Chile">
                <h3>Chile</h3>
                <p>R$ 1052,90</p>
            </section>
 
            <section class="card">
                <img src="imagens\portugal.jpeg" alt="Viagem a Portugal">
                <h3>Portugal</h3>
                <p>R$ 350,90</p>
            </section>
 
            <section class="card">
                <img src="imagens\japao.jpeg" alt="Viagem ao Japão">
                <h3>Japão</h3>
                <p>R$ 5000,90</p>
            </section>
        

        </main>
 
        <footer class="footer">
            <p>© 2026 Viajar Mais - Todos os direitos reservados</p>
        </footer>
 
    </div>
 
</body>
 
</html>
