<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css">
  <title>NEXT LEVEL GYM</title>
</head>

<body>

  <header>
    
    <!-- LOGO -->
    <div class="logo">
      <img src="logo.png" alt="Logo Next Level Gym">
    </div>

    <!-- TEXTO CENTRAL -->
    <p>A melhor rede de academias</p>

    <!-- MENU -->
    <nav>
      <ul>
        <li><a href="#academias">Academias</a></li>
        <li><a href="#contato">Contato</a></li>
        <li><a href="#planos">Planos</a></li>
      </ul>
    </nav>

  </header>

  <main>
    <section class="banner">
      <img src="image.png" alt="oferta">
    </section>

    <section class="unidades">
      <h2>NOSSAS UNIDADES</h2>

      <div class="cards">

        <div class="card">
          <img src="image copy.png" alt="Unidade X">
          <h3>UNIDADE X</h3>
          <p>Rua dos exemplos, 123 - Centro</p>
          <a href="#">VER UNIDADE</a>
        </div>

        <div class="card">
          <img src="image copy.png" alt="Unidade Y">
          <h3>UNIDADE Y</h3>
          <p>Av. dos exemplos, 456 - Norte</p>
          <a href="#">VER UNIDADE</a>
        </div>

        <div class="card">
          <img src="image copy.png" alt="Unidade Z">
          <h3>UNIDADE Z</h3>
          <p>Rua exemplo do sul, 789 - Oeste</p>
          <a href="#">VER UNIDADE</a>
        </div>

      </div>
    </section>

  </main>

  <footer>
    <small>&copy; 2026 — NEXT LEVEL GYM</small>
  </footer>

</body>
</html>
