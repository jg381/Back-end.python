<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajar Mais</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container">

            <div class="logo">
                <img src="logo.png" alt="Viajar Mais">
            </div>

            <div class="search-box">
                <input type="text" placeholder="Pesquisar destinos...">
            </div>

            <nav>
                <a href="#">Início</a>
                <a href="#">Viagens</a>
                <a href="#">Contato</a>
            </nav>

        </div>
    </header>

    <!-- banner) -->
    <section class="banner"></section>

    <!-- BUSCA -->
    <section class="busca">
        <div class="container">

            <h2>Onde quer ir?</h2>

            <div class="form">
                <input type="text" placeholder="Embarque">
                <input type="text" placeholder="Destino">
                <input type="date">
                <input type="date">
                <button>Buscar</button>
            </div>

        </div>
    </section>

    <!-- DESTINOS -->
    <section class="destinos">
        <div class="container">

            <div class="card">
                <img src="rj.png" alt="">
                <h3>Rio de Janeiro</h3>
                <p>R$ 505,90</p>
            </div>

            <div class="card">
                <img src="chile.png" alt="">
                <h3>Chile</h3>
                <p>R$ 1052,00</p>
            </div>

            <div class="card">
                <img src="portugal.png" alt="">
                <h3>Portugal</h3>
                <p>R$ 350,00</p>
            </div>

            <div class="card">
                <img src="japãp.png" alt="">
                <h3>Japão</h3>
                <p>R$ 5000,00</p>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Viajar Mais - Todos os direitos reservados</p>
    </footer>

</body>
</html>
